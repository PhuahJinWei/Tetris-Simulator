<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Tetris 10×18 (PNG tiles)</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      background: #0b0f19;
      color: #e8eefc;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      overflow: hidden;
      display: grid;
      place-items: center;
    }

    .game {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 10px;
      gap: 10px;
    }

    .topbar {
      width: 100%;
      max-width: 980px;
      height: clamp(86px, 12vh, 130px);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
    }

    .slot {
      display: flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
      min-width: 0;
    }
    .slotTitle {
      font-size: 12px;
      opacity: 0.85;
      letter-spacing: 0.2px;
    }
    .midStats {
      display: grid;
      gap: 6px;
      text-align: center;
    }
    .statsRow {
      display: flex;
      justify-content: center;
      gap: 14px;
      flex-wrap: wrap;
      font-variant-numeric: tabular-nums;
    }
    .stat {
      display: flex;
      gap: 6px;
      align-items: baseline;
      justify-content: center;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.10);
      font-size: 12px;
      white-space: nowrap;
    }
    .stat .k { opacity: 0.75; }
    .stat .v { font-weight: 800; }

    .stateLine {
      font-size: 12px;
      opacity: 0.85;
    }
    .assetLine {
      font-size: 11px;
      opacity: 0.75;
    }

    .boardWrap {
      flex: 1;
      width: 100%;
      max-width: 980px;
      display: grid;
      place-items: center;
      min-height: 0;
    }

    canvas {
      display: block;
      border-radius: 16px;
      background: #050713;
      border: 1px solid rgba(255,255,255,0.16);
      touch-action: none;
    }

    .help {
      position: fixed;
      left: 10px;
      bottom: 10px;
      font-size: 12px;
      opacity: 0.75;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      padding: 8px 10px;
      border-radius: 12px;
      backdrop-filter: blur(6px);
      max-width: min(520px, 92vw);
      line-height: 1.35;
    }
    @media (max-width: 520px) {
      .help { display: none; } /* keep small screens clean */
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="topbar" id="topbar">
      <div class="slot">
        <div class="slotTitle">HOLD (C)</div>
        <canvas id="hold" width="200" height="200"></canvas>
      </div>

      <div class="slot midStats">
        <div class="statsRow">
          <div class="stat"><span class="k">Score</span><span class="v" id="score">0</span></div>
          <div class="stat"><span class="k">Level</span><span class="v" id="level">1</span></div>
          <div class="stat"><span class="k">Lines</span><span class="v" id="lines">0</span></div>
        </div>
        <div class="stateLine" id="state">Loading…</div>
        <div class="assetLine" id="assetStatus">Assets: loading…</div>
      </div>

      <div class="slot">
        <div class="slotTitle">NEXT</div>
        <canvas id="next" width="200" height="200"></canvas>
      </div>
    </div>

    <div class="boardWrap">
      <canvas id="board" width="500" height="900" aria-label="Tetris board"></canvas>
    </div>
  </div>

  <div class="help">
    Controls: ← → move (hold to repeat), ↓ soft drop, ↑ rotate, Space hard drop, C hold, P pause, R restart
  </div>

  <script>
    /***********************
     * Assets (your paths)
     ***********************/
    const ASSET_MAP = {
      cyan:   "./asset/blocks/block_cyan.png",
      yellow: "./asset/blocks/block_yellow.png",
      purple: "./asset/blocks/block_purple.png",
      green:  "./asset/blocks/block_green.png",
      red:    "./asset/blocks/block_light_red.png",
      blue:   "./asset/blocks/block_blue.png",
      orange: "./asset/blocks/block_red.png",
    };

    /***********************
     * Board size
     ***********************/
    const COLS = 10;
    const ROWS = 18;

    /***********************
     * Scoring / speed
     ***********************/
    const LINE_POINTS = [0, 100, 300, 500, 800];
    const DROP_SOFT = 1;
    const DROP_HARD = 2;

    function levelToMs(level) {
      return Math.max(70, 700 - (level - 1) * 55);
    }

    /***********************
     * Pieces (4 rotations each)
     ***********************/
    const PIECES = {
      I: { key: "cyan", rots: [
        [[0,1],[1,1],[2,1],[3,1]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[1,0],[1,1],[1,2],[1,3]],
      ]},
      O: { key: "yellow", rots: [
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
      ]},
      T: { key: "purple", rots: [
        [[1,1],[0,2],[1,2],[2,2]],
        [[1,1],[1,2],[2,2],[1,3]],
        [[0,2],[1,2],[2,2],[1,3]],
        [[1,1],[0,2],[1,2],[1,3]],
      ]},
      S: { key: "green", rots: [
        [[1,1],[2,1],[0,2],[1,2]],
        [[1,1],[1,2],[2,2],[2,3]],
        [[1,2],[2,2],[0,3],[1,3]],
        [[0,1],[0,2],[1,2],[1,3]],
      ]},
      Z: { key: "red", rots: [
        [[0,1],[1,1],[1,2],[2,2]],
        [[2,1],[1,2],[2,2],[1,3]],
        [[0,2],[1,2],[1,3],[2,3]],
        [[1,1],[0,2],[1,2],[0,3]],
      ]},
      J: { key: "blue", rots: [
        [[0,1],[0,2],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[1,3]],
        [[0,2],[1,2],[2,2],[2,3]],
        [[1,1],[1,2],[0,3],[1,3]],
      ]},
      L: { key: "orange", rots: [
        [[2,1],[0,2],[1,2],[2,2]],
        [[1,1],[1,2],[1,3],[2,3]],
        [[0,2],[1,2],[2,2],[0,3]],
        [[0,1],[1,1],[1,2],[1,3]],
      ]},
    };
    const PIECE_TYPES = Object.keys(PIECES);

    /***********************
     * Canvas / UI
     ***********************/
    const boardCanvas = document.getElementById("board");
    const boardCtx = boardCanvas.getContext("2d");

    const nextCanvas = document.getElementById("next");
    const nextCtx = nextCanvas.getContext("2d");
    const holdCanvas = document.getElementById("hold");
    const holdCtx = holdCanvas.getContext("2d");

    const elScore = document.getElementById("score");
    const elLines = document.getElementById("lines");
    const elLevel = document.getElementById("level");
    const elState = document.getElementById("state");
    const elAssetStatus = document.getElementById("assetStatus");
    const topbarEl = document.getElementById("topbar");

    /***********************
     * HiDPI + responsive sizing
     ***********************/
    let tile = 50;          // computed at runtime
    let cssBoardW = 500;
    let cssBoardH = 900;

    let previewTile = 40;   // computed at runtime (for 4x4 previews)
    let cssMini = 160;

    function setupCanvasSize(canvas, cssW, cssH) {
      const dpr = Math.max(1, Math.floor(window.devicePixelRatio || 1));
      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return ctx;
    }

    function resize() {
      // available space (board should fit below the bar)
      const barH = topbarEl.getBoundingClientRect().height;
      const pad = 10 /* outer padding */ + 10 /* gap */;
      const availH = Math.max(120, window.innerHeight - barH - pad * 2);
      const availW = Math.max(120, window.innerWidth - pad * 2);

      // choose largest tile that fits in both directions
      tile = Math.floor(Math.min(availH / ROWS, availW / COLS));
      tile = Math.max(14, tile);

      cssBoardW = tile * COLS;
      cssBoardH = tile * ROWS;

      // previews: 4x4 area
      const miniAvail = Math.floor(barH - 34); // title + padding
      previewTile = Math.floor(Math.min(miniAvail / 4, 60));
      previewTile = Math.max(12, previewTile);
      cssMini = previewTile * 4;

      setupCanvasSize(boardCanvas, cssBoardW, cssBoardH);
      setupCanvasSize(nextCanvas, cssMini, cssMini);
      setupCanvasSize(holdCanvas, cssMini, cssMini);

      drawAll();
    }
    window.addEventListener("resize", resize);

    /***********************
     * Image loading
     ***********************/
    const images = {};
    const imageReady = {};

    function loadImages(map) {
      const keys = Object.keys(map);
      let done = 0;
      return new Promise((resolve) => {
        keys.forEach((k) => {
          const img = new Image();
          images[k] = img;
          imageReady[k] = false;

          img.onload = () => { imageReady[k] = true; done++; if (done === keys.length) resolve(); };
          img.onerror = () => { done++; if (done === keys.length) resolve(); };
          img.src = map[k];
        });
      });
    }

    function hasAllCoreTiles() {
      return ["cyan","yellow","purple","green","red","blue","orange"].every(k => imageReady[k]);
    }

    /***********************
     * Game state
     ***********************/
    let board, score, lines, level;
    let bag = [];
    let current = null;
    let next = null;
    let hold = null;
    let holdUsed = false;

    let paused = false;
    let gameOver = false;

    let lastTime = 0;
    let dropAcc = 0;
    let dropMs = levelToMs(1);

    function newBoard() {
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }

    function refillBag() {
      bag = PIECE_TYPES.slice();
      for (let i = bag.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
    }

    function takeFromBag() {
      if (bag.length === 0) refillBag();
      return bag.pop();
    }

    function spawnPiece(type) {
      const p = PIECES[type];
      return { type, key: p.key, rot: 0, x: 3, y: -2 };
    }

    function cellsOf(piece) {
      const shape = PIECES[piece.type].rots[piece.rot];
      return shape.map(([dx, dy]) => [piece.x + dx, piece.y + dy]);
    }

    function collides(piece) {
      for (const [x, y] of cellsOf(piece)) {
        if (x < 0 || x >= COLS) return true;
        if (y >= ROWS) return true;
        if (y >= 0 && board[y][x]) return true;
      }
      return false;
    }

    function clearLines() {
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--) {
        if (board[y].every(c => c !== null)) {
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared > 0) {
        lines += cleared;
        score += LINE_POINTS[cleared] * level;

        const newLevel = Math.floor(lines / 10) + 1;
        if (newLevel !== level) {
          level = newLevel;
          dropMs = levelToMs(level);
        }
      }
    }

    function lockPiece() {
      for (const [x, y] of cellsOf(current)) {
        if (y < 0) { gameOver = true; return; }
        board[y][x] = current.key;
      }
      clearLines();
      holdUsed = false;
      current = next;
      next = spawnPiece(takeFromBag());
      if (collides(current)) gameOver = true;
    }

    function softDrop() {
      if (gameOver || paused) return;
      const test = { ...current, y: current.y + 1 };
      if (!collides(test)) {
        current = test;
        score += DROP_SOFT;
      } else {
        lockPiece();
      }
    }

    function hardDrop() {
      if (gameOver || paused) return;
      let moved = 0;
      while (true) {
        const test = { ...current, y: current.y + 1 };
        if (collides(test)) break;
        current = test;
        moved++;
      }
      score += moved * DROP_HARD;
      lockPiece();
    }

    function move(dx) {
      if (gameOver || paused) return;
      const test = { ...current, x: current.x + dx };
      if (!collides(test)) current = test;
    }

    function rotate(dir) {
      if (gameOver || paused) return;
      const nextRot = (current.rot + dir + 4) % 4;
      const base = { ...current, rot: nextRot };

      // simple wall kicks
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks) {
        const test = { ...base, x: base.x + k };
        if (!collides(test)) { current = test; return; }
      }
    }

    function holdPiece() {
      if (gameOver || paused) return;
      if (holdUsed) return;
      holdUsed = true;

      if (!hold) {
        hold = current.type;
        current = next;
        next = spawnPiece(takeFromBag());
      } else {
        const tmp = hold;
        hold = current.type;
        current = spawnPiece(tmp);
      }

      current.x = 3; current.y = -2; current.rot = 0;
      if (collides(current)) gameOver = true;
    }

    function restart() {
      board = newBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropMs = levelToMs(level);

      refillBag();
      current = spawnPiece(takeFromBag());
      next = spawnPiece(takeFromBag());
      hold = null;
      holdUsed = false;

      paused = false;
      gameOver = false;
      dropAcc = 0;

      setStateText();
      drawAll();
    }

    function togglePause() {
      if (gameOver) return;
      paused = !paused;
      setStateText();
    }

    function setStateText() {
      if (gameOver) elState.textContent = "Game Over (R to restart)";
      else if (paused) elState.textContent = "Paused (P to resume)";
      else elState.textContent = "Playing";
    }

    /***********************
     * Ghost piece (preview landing)
     ***********************/
    function ghostPieceOf(piece) {
      let g = { ...piece };
      while (true) {
        const test = { ...g, y: g.y + 1 };
        if (collides(test)) break;
        g = test;
      }
      return g;
    }

    /***********************
     * Rendering
     ***********************/
    function drawTile(ctx, key, x, y, size, alpha = 1) {
      const px = x * size;
      const py = y * size;

      ctx.save();
      ctx.globalAlpha = alpha;

      if (imageReady[key] && images[key]) {
        ctx.drawImage(images[key], px, py, size, size);
      } else {
        // fallback block if image missing
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(px, py, size, size);
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.strokeRect(px + 1, py + 1, size - 2, size - 2);
      }
      ctx.restore();
    }

    function clearCanvas(ctx, w, h) {
      ctx.clearRect(0, 0, w, h);
    }

    function drawGridLines(ctx) {
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      for (let x = 1; x < COLS; x++) {
        ctx.beginPath();
        ctx.moveTo(x * tile, 0);
        ctx.lineTo(x * tile, ROWS * tile);
        ctx.stroke();
      }
      for (let y = 1; y < ROWS; y++) {
        ctx.beginPath();
        ctx.moveTo(0, y * tile);
        ctx.lineTo(COLS * tile, y * tile);
        ctx.stroke();
      }
      ctx.restore();
    }

    function drawBoard() {
      clearCanvas(boardCtx, boardCanvas.width, boardCanvas.height);

      // settled blocks
      for (let y = 0; y < ROWS; y++) {
        for (let x = 0; x < COLS; x++) {
          const cell = board[y][x];
          if (cell) drawTile(boardCtx, cell, x, y, tile, 1);
        }
      }

      // ghost piece
      if (current && !gameOver) {
        const g = ghostPieceOf(current);
        for (const [x, y] of cellsOf(g)) {
          if (y >= 0) drawTile(boardCtx, g.key, x, y, tile, 0.28);
        }
      }

      // current piece
      if (current && !gameOver) {
        for (const [x, y] of cellsOf(current)) {
          if (y >= 0) drawTile(boardCtx, current.key, x, y, tile, 1);
        }
      }

      drawGridLines(boardCtx);

      // game over overlay
      if (gameOver) {
        boardCtx.save();
        boardCtx.fillStyle = "rgba(0,0,0,0.55)";
        boardCtx.fillRect(0, 0, cssBoardW, cssBoardH);
        boardCtx.fillStyle = "rgba(255,255,255,0.95)";
        boardCtx.textAlign = "center";
        boardCtx.font = `700 ${Math.max(18, Math.floor(tile * 0.9))}px system-ui, sans-serif`;
        boardCtx.fillText("GAME OVER", cssBoardW / 2, cssBoardH / 2 - 10);
        boardCtx.font = `500 ${Math.max(12, Math.floor(tile * 0.35))}px system-ui, sans-serif`;
        boardCtx.fillText("Press R to restart", cssBoardW / 2, cssBoardH / 2 + 22);
        boardCtx.restore();
      }
    }

    function drawMini(ctx, type) {
      clearCanvas(ctx, cssMini, cssMini);
      if (!type) return;

      // 4x4 preview area (tile = previewTile)
      const shape = PIECES[type].rots[0];
      for (const [dx, dy] of shape) {
        drawTile(ctx, PIECES[type].key, dx, dy, previewTile, 1);
      }

      // subtle 4x4 grid
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      for (let i = 1; i < 4; i++) {
        ctx.beginPath(); ctx.moveTo(i * previewTile, 0); ctx.lineTo(i * previewTile, cssMini); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i * previewTile); ctx.lineTo(cssMini, i * previewTile); ctx.stroke();
      }
      ctx.restore();
    }

    function drawHUD() {
      elScore.textContent = String(score);
      elLines.textContent = String(lines);
      elLevel.textContent = String(level);
      setStateText();

      drawMini(nextCtx, next?.type);
      drawMini(holdCtx, hold);
    }

    function drawAll() {
      if (!board) return;
      drawBoard();
      drawHUD();
    }

    /***********************
     * Hold-to-move input (continuous)
     ***********************/
    const input = {
      left: false,
      right: false,
      down: false,
      leftTime: 0,
      rightTime: 0,
      downTime: 0,
      leftRepeats: 0,
      rightRepeats: 0,
    };

    const DAS = 160;   // initial delay before repeats (ms)
    const ARR = 45;    // repeat rate for left/right (ms)
    const ARR_DOWN = 35; // repeat for soft drop (ms)

    function handleHeldKeys(dt) {
      if (paused || gameOver) return;

      // left
      if (input.left && !input.right) {
        input.leftTime += dt;
        if (input.leftTime >= DAS) {
          const repeats = Math.floor((input.leftTime - DAS) / ARR);
          while (input.leftRepeats < repeats) {
            move(-1);
            input.leftRepeats++;
          }
        }
      }

      // right
      if (input.right && !input.left) {
        input.rightTime += dt;
        if (input.rightTime >= DAS) {
          const repeats = Math.floor((input.rightTime - DAS) / ARR);
          while (input.rightRepeats < repeats) {
            move(1);
            input.rightRepeats++;
          }
        }
      }

      // down (soft drop repeat)
      if (input.down) {
        input.downTime += dt;
        while (input.downTime >= ARR_DOWN) {
          input.downTime -= ARR_DOWN;
          softDrop();
          if (gameOver) break;
        }
      }
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key;
      if (["ArrowLeft","ArrowRight","ArrowDown","ArrowUp"," "].includes(k)) e.preventDefault();

      // global controls
      if (k === "p" || k === "P") { togglePause(); drawAll(); return; }
      if (k === "r" || k === "R") { restart(); drawAll(); return; }

      if (paused || gameOver) return;

      // held movement (only set flags once, ignore browser key-repeat)
      if (k === "ArrowLeft" && !input.left) {
        input.left = true;
        input.leftTime = 0;
        input.leftRepeats = 0;
        move(-1); // immediate
      } else if (k === "ArrowRight" && !input.right) {
        input.right = true;
        input.rightTime = 0;
        input.rightRepeats = 0;
        move(1); // immediate
      } else if (k === "ArrowDown" && !input.down) {
        input.down = true;
        input.downTime = 0;
        softDrop(); // immediate
      } else if (k === "ArrowUp") {
        rotate(1);
      } else if (k === " ") {
        hardDrop();
      } else if (k === "c" || k === "C") {
        holdPiece();
      }

      drawAll();
    });

    window.addEventListener("keyup", (e) => {
      const k = e.key;
      if (k === "ArrowLeft") {
        input.left = false;
        input.leftTime = 0;
        input.leftRepeats = 0;
      } else if (k === "ArrowRight") {
        input.right = false;
        input.rightTime = 0;
        input.rightRepeats = 0;
      } else if (k === "ArrowDown") {
        input.down = false;
        input.downTime = 0;
      }
    });

    /***********************
     * Main loop
     ***********************/
    function tick(t) {
      const dt = t - lastTime;
      lastTime = t;

      if (!paused && !gameOver) {
        // handle held keys (continuous movement)
        handleHeldKeys(dt);

        // gravity
        dropAcc += dt;
        while (dropAcc >= dropMs) {
          dropAcc -= dropMs;
          const test = { ...current, y: current.y + 1 };
          if (!collides(test)) current = test;
          else { lockPiece(); break; }
        }
      }

      drawAll();
      requestAnimationFrame(tick);
    }

    /***********************
     * Boot
     ***********************/
    (async function boot() {
      elState.textContent = "Loading…";
      await loadImages(ASSET_MAP);

      if (hasAllCoreTiles()) elAssetStatus.textContent = "Assets: OK";
      else elAssetStatus.textContent = "Assets: missing some PNGs (fallback blocks used)";

      restart();
      resize();
      lastTime = performance.now();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
