<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Tetris 10×18 (Frame-scaled)</title>
  <style>
    * { box-sizing: border-box; }
    body{
      margin:0;
      height:100vh;
      background:#0b0f19;
      color:#e8eefc;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow:hidden;
    }

    /* FRAME: everything scales inside this */
    .frame{
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      padding:12px;
    }

    /* STAGE WRAP keeps scaled size centered */
    .stageWrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
    }

    /* STAGE is the "native" size; we scale it with transform */
    .stage{
      --scale: 1;
      transform: scale(var(--scale));
      transform-origin: top left;

      /* native size (set by JS too, but these help layout) */
      width: 500px;
      height: 1090px; /* topbar(180) + gap(10) + board(900) */
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:center;
    }

    .topbar{
      width:500px;
      height:180px;
      display:grid;
      grid-template-columns: 1fr 1.2fr 1fr;
      gap:10px;
      align-items:center;
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(6px);
    }

    .slot{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:6px;
      min-width:0;
    }
    .slotTitle{ font-size:12px; opacity:0.85; letter-spacing:0.2px; }

    .midStats{
      display:grid;
      gap:6px;
      text-align:center;
    }
    .statsRow{
      display:flex;
      justify-content:center;
      gap:10px;
      flex-wrap:wrap;
      font-variant-numeric: tabular-nums;
    }
    .stat{
      display:flex;
      gap:6px;
      align-items:baseline;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(255,255,255,0.07);
      border:1px solid rgba(255,255,255,0.10);
      font-size:12px;
      white-space:nowrap;
    }
    .stat .k{ opacity:0.75; }
    .stat .v{ font-weight:800; }

    .stateLine{ font-size:12px; opacity:0.85; }
    .assetLine{ font-size:11px; opacity:0.75; }

    .boardWrap{
      width:500px;
      height:900px;
      display:grid;
      place-items:center;
    }

    canvas{
      display:block;
      border-radius:16px;
      background:#050713;
      border:1px solid rgba(255,255,255,0.16);
      touch-action:none;
      image-rendering: pixelated;
    }

    .help{
      position:fixed;
      left:10px;
      bottom:10px;
      font-size:12px;
      opacity:0.75;
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      padding:8px 10px;
      border-radius:12px;
      backdrop-filter: blur(6px);
      max-width:min(520px,92vw);
      line-height:1.35;
    }
    @media (max-width:520px){ .help{display:none;} }
  </style>
</head>
<body>
  <div class="frame">
    <div class="stageWrap">
      <div class="stage" id="stage">
        <div class="topbar" id="topbar">
          <div class="slot">
            <div class="slotTitle">HOLD (C)</div>
            <canvas id="hold"></canvas>
          </div>

          <div class="slot midStats">
            <div class="statsRow">
              <div class="stat"><span class="k">Score</span><span class="v" id="score">0</span></div>
              <div class="stat"><span class="k">Level</span><span class="v" id="level">1</span></div>
              <div class="stat"><span class="k">Lines</span><span class="v" id="lines">0</span></div>
            </div>
            <div class="stateLine" id="state">Loading…</div>
            <div class="assetLine" id="assetStatus">Assets: loading…</div>
          </div>

          <div class="slot">
            <div class="slotTitle">NEXT</div>
            <canvas id="next"></canvas>
          </div>
        </div>

        <div class="boardWrap">
          <canvas id="board" aria-label="Tetris board"></canvas>
        </div>
      </div>
    </div>
  </div>

  <div class="help">
    Controls: ← → move (hold to repeat), ↓ soft drop, ↑ rotate, Space hard drop, C hold, P pause, R restart
  </div>

  <script>
    /***********************
     * Assets (your paths)
     ***********************/
    const ASSET_MAP = {
      cyan:   "./asset/blocks/block_cyan.png",
      yellow: "./asset/blocks/block_yellow.png",
      purple: "./asset/blocks/block_purple.png",
      green:  "./asset/blocks/block_green.png",
      red:    "./asset/blocks/block_red.png",
      blue:   "./asset/blocks/block_blue.png",
      orange: "./asset/blocks/block_orange.png",
    };

    /***********************
     * Native layout sizes (the STAGE scales as a unit)
     ***********************/
    const COLS = 10, ROWS = 18;
    const TILE = 50;                 // native board tile size (matches your PNGs)
    const BOARD_W = COLS * TILE;     // 500
    const BOARD_H = ROWS * TILE;     // 900

    const TOPBAR_H = 180;
    const GAP = 10;
    const STAGE_W = BOARD_W;         // topbar and board same width
    const STAGE_H = TOPBAR_H + GAP + BOARD_H;

    // Preview canvases in topbar (native)
    const MINI_SIZE = 160;           // px
    const MINI_TILE = 40;            // 4x4 preview grid (160/4)
    const LINE_POINTS = [0,100,300,500,800];
    const DROP_SOFT = 1, DROP_HARD = 2;

    function levelToMs(level){ return Math.max(70, 700 - (level - 1) * 55); }

    /***********************
     * Pieces
     ***********************/
    const PIECES = {
      I: { key:"cyan", rots:[
        [[0,1],[1,1],[2,1],[3,1]],
        [[2,0],[2,1],[2,2],[2,3]],
        [[0,2],[1,2],[2,2],[3,2]],
        [[1,0],[1,1],[1,2],[1,3]],
      ]},
      O: { key:"yellow", rots:[
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[2,2]],
      ]},
      T: { key:"purple", rots:[
        [[1,1],[0,2],[1,2],[2,2]],
        [[1,1],[1,2],[2,2],[1,3]],
        [[0,2],[1,2],[2,2],[1,3]],
        [[1,1],[0,2],[1,2],[1,3]],
      ]},
      S: { key:"green", rots:[
        [[1,1],[2,1],[0,2],[1,2]],
        [[1,1],[1,2],[2,2],[2,3]],
        [[1,2],[2,2],[0,3],[1,3]],
        [[0,1],[0,2],[1,2],[1,3]],
      ]},
      Z: { key:"red", rots:[
        [[0,1],[1,1],[1,2],[2,2]],
        [[2,1],[1,2],[2,2],[1,3]],
        [[0,2],[1,2],[1,3],[2,3]],
        [[1,1],[0,2],[1,2],[0,3]],
      ]},
      J: { key:"blue", rots:[
        [[0,1],[0,2],[1,2],[2,2]],
        [[1,1],[2,1],[1,2],[1,3]],
        [[0,2],[1,2],[2,2],[2,3]],
        [[1,1],[1,2],[0,3],[1,3]],
      ]},
      L: { key:"orange", rots:[
        [[2,1],[0,2],[1,2],[2,2]],
        [[1,1],[1,2],[1,3],[2,3]],
        [[0,2],[1,2],[2,2],[0,3]],
        [[0,1],[1,1],[1,2],[1,3]],
      ]},
    };
    const PIECE_TYPES = Object.keys(PIECES);

    /***********************
     * Elements
     ***********************/
    const stageEl = document.getElementById("stage");
    const boardCanvas = document.getElementById("board");
    const holdCanvas  = document.getElementById("hold");
    const nextCanvas  = document.getElementById("next");

    const boardCtx = boardCanvas.getContext("2d");
    const holdCtx  = holdCanvas.getContext("2d");
    const nextCtx  = nextCanvas.getContext("2d");

    const elScore = document.getElementById("score");
    const elLines = document.getElementById("lines");
    const elLevel = document.getElementById("level");
    const elState = document.getElementById("state");
    const elAssetStatus = document.getElementById("assetStatus");

    /***********************
     * HiDPI setup (native sizes, then stage scales)
     ***********************/
    function setupHiDPI(canvas, cssW, cssH){
      const dpr = window.devicePixelRatio || 1;
      canvas.style.width = cssW + "px";
      canvas.style.height = cssH + "px";
      canvas.width = Math.floor(cssW * dpr);
      canvas.height = Math.floor(cssH * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.imageSmoothingEnabled = false;
      return ctx;
    }

    function setupNativeLayout(){
      // stage native dimensions
      stageEl.style.width = STAGE_W + "px";
      stageEl.style.height = STAGE_H + "px";

      setupHiDPI(boardCanvas, BOARD_W, BOARD_H);
      setupHiDPI(holdCanvas, MINI_SIZE, MINI_SIZE);
      setupHiDPI(nextCanvas, MINI_SIZE, MINI_SIZE);
    }

    /***********************
     * Frame scaling: scale stage to fit the frame
     ***********************/
    function fitStageToFrame(){
      // Available pixels inside viewport (frame has padding 12px)
      const availW = Math.max(50, window.innerWidth - 24);
      const availH = Math.max(50, window.innerHeight - 24);

      const s = Math.min(availW / STAGE_W, availH / STAGE_H);
      stageEl.style.setProperty("--scale", String(s));
    }
    window.addEventListener("resize", () => {
      setupNativeLayout();  // update DPR-based canvas sizes on rotation/device changes
      fitStageToFrame();
      drawAll();
    });

    /***********************
     * Image loading
     ***********************/
    const images = {};
    const imageReady = {};
    function loadImages(map){
      const keys = Object.keys(map);
      let done = 0;
      return new Promise((resolve) => {
        keys.forEach((k) => {
          const img = new Image();
          images[k] = img;
          imageReady[k] = false;
          img.onload = () => { imageReady[k] = true; done++; if (done === keys.length) resolve(); };
          img.onerror = () => { done++; if (done === keys.length) resolve(); };
          img.src = map[k];
        });
      });
    }
    function hasAllCoreTiles(){
      return ["cyan","yellow","purple","green","red","blue","orange"].every(k => imageReady[k]);
    }

    /***********************
     * Game state
     ***********************/
    let board, score, lines, level;
    let bag = [];
    let current = null;
    let next = null;
    let hold = null;
    let holdUsed = false;
    let paused = false;
    let gameOver = false;

    let lastTime = 0;
    let dropAcc = 0;
    let dropMs = levelToMs(1);

    function newBoard(){
      return Array.from({ length: ROWS }, () => Array(COLS).fill(null));
    }
    function refillBag(){
      bag = PIECE_TYPES.slice();
      for (let i = bag.length - 1; i > 0; i--){
        const j = Math.floor(Math.random() * (i + 1));
        [bag[i], bag[j]] = [bag[j], bag[i]];
      }
    }
    function takeFromBag(){
      if (bag.length === 0) refillBag();
      return bag.pop();
    }
    function spawnPiece(type){
      const p = PIECES[type];
      return { type, key: p.key, rot: 0, x: 3, y: -2 };
    }
    function cellsOf(piece){
      const shape = PIECES[piece.type].rots[piece.rot];
      return shape.map(([dx,dy]) => [piece.x + dx, piece.y + dy]);
    }
    function collides(piece){
      for (const [x,y] of cellsOf(piece)){
        if (x < 0 || x >= COLS) return true;
        if (y >= ROWS) return true;
        if (y >= 0 && board[y][x]) return true;
      }
      return false;
    }

    function clearLines(){
      let cleared = 0;
      for (let y = ROWS - 1; y >= 0; y--){
        if (board[y].every(c => c !== null)){
          board.splice(y, 1);
          board.unshift(Array(COLS).fill(null));
          cleared++;
          y++;
        }
      }
      if (cleared){
        lines += cleared;
        score += LINE_POINTS[cleared] * level;
        const newLevel = Math.floor(lines / 10) + 1;
        if (newLevel !== level){
          level = newLevel;
          dropMs = levelToMs(level);
        }
      }
    }

    function lockPiece(){
      for (const [x,y] of cellsOf(current)){
        if (y < 0) { gameOver = true; return; }
        board[y][x] = current.key;
      }
      clearLines();
      holdUsed = false;
      current = next;
      next = spawnPiece(takeFromBag());
      if (collides(current)) gameOver = true;
    }

    function softDrop(){
      if (gameOver || paused) return;
      const test = { ...current, y: current.y + 1 };
      if (!collides(test)){
        current = test;
        score += DROP_SOFT;
      } else {
        lockPiece();
      }
    }

    function hardDrop(){
      if (gameOver || paused) return;
      let moved = 0;
      while (true){
        const test = { ...current, y: current.y + 1 };
        if (collides(test)) break;
        current = test;
        moved++;
      }
      score += moved * DROP_HARD;
      lockPiece();
    }

    function move(dx){
      if (gameOver || paused) return;
      const test = { ...current, x: current.x + dx };
      if (!collides(test)) current = test;
    }

    function rotate(dir){
      if (gameOver || paused) return;
      const nextRot = (current.rot + dir + 4) % 4;
      const base = { ...current, rot: nextRot };
      const kicks = [0, -1, 1, -2, 2];
      for (const k of kicks){
        const test = { ...base, x: base.x + k };
        if (!collides(test)) { current = test; return; }
      }
    }

    function holdPiece(){
      if (gameOver || paused) return;
      if (holdUsed) return;
      holdUsed = true;

      if (!hold){
        hold = current.type;
        current = next;
        next = spawnPiece(takeFromBag());
      } else {
        const tmp = hold;
        hold = current.type;
        current = spawnPiece(tmp);
      }
      current.x = 3; current.y = -2; current.rot = 0;
      if (collides(current)) gameOver = true;
    }

    function restart(){
      board = newBoard();
      score = 0;
      lines = 0;
      level = 1;
      dropMs = levelToMs(level);

      refillBag();
      current = spawnPiece(takeFromBag());
      next = spawnPiece(takeFromBag());

      hold = null;
      holdUsed = false;

      paused = false;
      gameOver = false;
      dropAcc = 0;

      setStateText();
      drawAll();
    }

    function togglePause(){
      if (gameOver) return;
      paused = !paused;
      setStateText();
    }
    function setStateText(){
      if (gameOver) elState.textContent = "Game Over (R)";
      else if (paused) elState.textContent = "Paused (P)";
      else elState.textContent = "Playing";
    }

    /***********************
     * Ghost piece
     ***********************/
    function ghostPieceOf(piece){
      let g = { ...piece };
      while (true){
        const test = { ...g, y: g.y + 1 };
        if (collides(test)) break;
        g = test;
      }
      return g;
    }

    /***********************
     * Rendering (native coordinates)
     ***********************/
    function clearCanvas(ctx, w, h){ ctx.clearRect(0,0,w,h); }

    function drawTile(ctx, key, x, y, size, alpha = 1){
      const px = x * size;
      const py = y * size;
      ctx.save();
      ctx.globalAlpha = alpha;
      if (imageReady[key] && images[key]){
        ctx.drawImage(images[key], px, py, size, size);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.18)";
        ctx.fillRect(px, py, size, size);
        ctx.strokeStyle = "rgba(255,255,255,0.35)";
        ctx.strokeRect(px + 1, py + 1, size - 2, size - 2);
      }
      ctx.restore();
    }

    function drawGridLines(){
      boardCtx.save();
      boardCtx.strokeStyle = "rgba(255,255,255,0.06)";
      for (let x = 1; x < COLS; x++){
        boardCtx.beginPath();
        boardCtx.moveTo(x * TILE, 0);
        boardCtx.lineTo(x * TILE, BOARD_H);
        boardCtx.stroke();
      }
      for (let y = 1; y < ROWS; y++){
        boardCtx.beginPath();
        boardCtx.moveTo(0, y * TILE);
        boardCtx.lineTo(BOARD_W, y * TILE);
        boardCtx.stroke();
      }
      boardCtx.restore();
    }

    function drawBoard(){
      clearCanvas(boardCtx, BOARD_W, BOARD_H);

      // settled
      for (let y = 0; y < ROWS; y++){
        for (let x = 0; x < COLS; x++){
          const cell = board[y][x];
          if (cell) drawTile(boardCtx, cell, x, y, TILE, 1);
        }
      }

      // ghost
      if (current && !gameOver){
        const g = ghostPieceOf(current);
        for (const [x,y] of cellsOf(g)){
          if (y >= 0) drawTile(boardCtx, g.key, x, y, TILE, 0.28);
        }
      }

      // current
      if (current && !gameOver){
        for (const [x,y] of cellsOf(current)){
          if (y >= 0) drawTile(boardCtx, current.key, x, y, TILE, 1);
        }
      }

      drawGridLines();

      if (gameOver){
        boardCtx.save();
        boardCtx.fillStyle = "rgba(0,0,0,0.55)";
        boardCtx.fillRect(0,0,BOARD_W,BOARD_H);
        boardCtx.fillStyle = "rgba(255,255,255,0.95)";
        boardCtx.textAlign = "center";
        boardCtx.font = "700 42px system-ui, sans-serif";
        boardCtx.fillText("GAME OVER", BOARD_W/2, BOARD_H/2 - 10);
        boardCtx.font = "500 16px system-ui, sans-serif";
        boardCtx.fillText("Press R to restart", BOARD_W/2, BOARD_H/2 + 22);
        boardCtx.restore();
      }
    }

    function drawMini(ctx, type){
      clearCanvas(ctx, MINI_SIZE, MINI_SIZE);
      if (!type) return;

      const shape = PIECES[type].rots[0];
      for (const [dx,dy] of shape){
        drawTile(ctx, PIECES[type].key, dx, dy, MINI_TILE, 1);
      }

      // subtle grid
      ctx.save();
      ctx.strokeStyle = "rgba(255,255,255,0.06)";
      for (let i = 1; i < 4; i++){
        ctx.beginPath(); ctx.moveTo(i*MINI_TILE, 0); ctx.lineTo(i*MINI_TILE, MINI_SIZE); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(0, i*MINI_TILE); ctx.lineTo(MINI_SIZE, i*MINI_TILE); ctx.stroke();
      }
      ctx.restore();
    }

    function drawHUD(){
      elScore.textContent = String(score);
      elLines.textContent = String(lines);
      elLevel.textContent = String(level);
      setStateText();
      drawMini(nextCtx, next?.type);
      drawMini(holdCtx, hold);
    }

    function drawAll(){
      if (!board) return;
      drawBoard();
      drawHUD();
    }

    /***********************
     * Hold-to-move keys (continuous)
     ***********************/
    const input = {
      left:false, right:false, down:false,
      leftTime:0, rightTime:0, downTime:0,
      leftRepeats:0, rightRepeats:0,
    };
    const DAS = 160;      // delay before repeat
    const ARR = 45;       // repeat rate left/right
    const ARR_DOWN = 35;  // repeat rate down

    function handleHeldKeys(dt){
      if (paused || gameOver) return;

      if (input.left && !input.right){
        input.leftTime += dt;
        if (input.leftTime >= DAS){
          const repeats = Math.floor((input.leftTime - DAS) / ARR);
          while (input.leftRepeats < repeats){
            move(-1);
            input.leftRepeats++;
          }
        }
      }

      if (input.right && !input.left){
        input.rightTime += dt;
        if (input.rightTime >= DAS){
          const repeats = Math.floor((input.rightTime - DAS) / ARR);
          while (input.rightRepeats < repeats){
            move(1);
            input.rightRepeats++;
          }
        }
      }

      if (input.down){
        input.downTime += dt;
        while (input.downTime >= ARR_DOWN){
          input.downTime -= ARR_DOWN;
          softDrop();
          if (gameOver) break;
        }
      }
    }

    window.addEventListener("keydown", (e) => {
      const k = e.key;
      if (["ArrowLeft","ArrowRight","ArrowDown","ArrowUp"," "].includes(k)) e.preventDefault();

      if (k === "p" || k === "P") { togglePause(); drawAll(); return; }
      if (k === "r" || k === "R") { restart(); drawAll(); return; }
      if (paused || gameOver) return;

      if (k === "ArrowLeft" && !input.left){
        input.left = true; input.leftTime = 0; input.leftRepeats = 0;
        move(-1);
      } else if (k === "ArrowRight" && !input.right){
        input.right = true; input.rightTime = 0; input.rightRepeats = 0;
        move(1);
      } else if (k === "ArrowDown" && !input.down){
        input.down = true; input.downTime = 0;
        softDrop();
      } else if (k === "ArrowUp"){
        rotate(1);
      } else if (k === " "){
        hardDrop();
      } else if (k === "c" || k === "C"){
        holdPiece();
      }

      drawAll();
    });

    window.addEventListener("keyup", (e) => {
      const k = e.key;
      if (k === "ArrowLeft"){
        input.left = false; input.leftTime = 0; input.leftRepeats = 0;
      } else if (k === "ArrowRight"){
        input.right = false; input.rightTime = 0; input.rightRepeats = 0;
      } else if (k === "ArrowDown"){
        input.down = false; input.downTime = 0;
      }
    });

    /***********************
     * Game loop
     ***********************/
    function tick(t){
      const dt = t - lastTime;
      lastTime = t;

      if (!paused && !gameOver){
        handleHeldKeys(dt);

        dropAcc += dt;
        while (dropAcc >= dropMs){
          dropAcc -= dropMs;
          const test = { ...current, y: current.y + 1 };
          if (!collides(test)) current = test;
          else { lockPiece(); break; }
        }
      }

      drawAll();
      requestAnimationFrame(tick);
    }

    /***********************
     * Boot
     ***********************/
    (async function boot(){
      setupNativeLayout();
      fitStageToFrame();

      elState.textContent = "Loading…";
      await loadImages(ASSET_MAP);
      elAssetStatus.textContent = hasAllCoreTiles() ? "Assets: OK" : "Assets: missing some PNGs (fallback used)";

      restart();
      lastTime = performance.now();
      requestAnimationFrame(tick);
    })();
  </script>
</body>
</html>
