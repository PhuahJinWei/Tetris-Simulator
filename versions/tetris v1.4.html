<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <title>Tetris 10×18</title>
  <style>
    *{ box-sizing:border-box; }
    :root{
      --bg:#0b0f19;
      --ink:#e8eefc;
      --muted:rgba(232,238,252,0.72);
    }
    html,body{
      height:100%;
      margin:0;
      background:var(--bg);
      color:var(--ink);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      overflow:hidden;
      touch-action:none;
    }

    /* FRAME: fills the screen; stage scales to fit */
    .frame{
      width:100vw;
      height:100vh;
      display:grid;
      place-items:center;
      padding:10px;
    }
    .stageWrap{
      width:100%;
      height:100%;
      display:grid;
      place-items:center;
    }

    /* Native stage size (like your sketch) */
    .stage{
      position:relative;
      width:670px;       /* board (500) + gap (20) + side (150) */
      height:970px;      /* topbar (70) + board (900) */
      transform: scale(var(--scale, 1));
      transform-origin: top left;
      user-select:none;
      -webkit-user-select:none;
    }

    /* TOP BAR above the game area */
    .topbar{
      position:absolute;
      left:0;
      top:0;
      width:500px;
      height:70px;
      border:2px solid rgba(255,255,255,0.35);
      background:rgba(255,255,255,0.04);
      display:grid;
      grid-template-columns: 140px 1fr;
      align-items:center;
      padding:8px 10px;
      gap:10px;
    }
    .topLeft{
      display:flex;
      gap:8px;
      align-items:center;
      justify-content:flex-start;
    }
    .iconBtn{
      width:44px;
      height:44px;
      border-radius:10px;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(255,255,255,0.08);
      color:var(--ink);
      font-size:20px;
      font-weight:900;
      display:grid;
      place-items:center;
      cursor:pointer;
      touch-action:none;
    }
    .iconBtn:active{
      transform: translateY(1px);
      background:rgba(255,255,255,0.14);
    }
    .scoreWrap{
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-variant-numeric: tabular-nums;
    }
    .scoreLabel{
      font-weight:900;
      font-size:20px;
      letter-spacing:0.4px;
    }
    .scoreValue{
      font-weight:900;
      font-size:22px;
    }

    /* GAME AREA (red box) */
    .boardWrap{
      position:absolute;
      left:0;
      top:70px;
      width:500px;
      height:900px;
      border:2px solid #ff2b2b;
      background:#050713;
      overflow:hidden;
      touch-action:none;
    }
    canvas{
      display:block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      touch-action:none;
    }

    /* Right side: Next + Hold */
    .side{
      position:absolute;
      left:520px; /* 500 + 20 gap */
      top:0;
      width:150px;
      height:970px;
    }
    .panelTitle{
      margin:0 0 6px 0;
      font-weight:900;
      font-size:16px;
      letter-spacing:0.3px;
      color:var(--ink);
      text-align:left;
    }
    .nextPanel{
      position:absolute;
      left:0;
      top:0;
      width:150px;
    }
    .nextStack{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-start;
    }
    .miniBox{
      width:150px;
      height:120px;
      border:2px solid rgba(255,255,255,0.35);
      background:rgba(255,255,255,0.04);
      display:grid;
      place-items:center;
    }

    .holdPanel{
      position:absolute;
      left:0;
      bottom:0;
      width:150px;
    }
    .holdBtn{
      width:150px;
      height:140px;
      border:2px solid rgba(255,255,255,0.35);
      background:rgba(255,255,255,0.04);
      display:grid;
      place-items:center;
      cursor:pointer;
      touch-action:none;
    }
    .holdBtn:active{
      background:rgba(255,255,255,0.10);
      transform: translateY(1px);
    }

    /* Mobile keypad overlay (semi-transparent) */
    .pads{
      position:absolute;
      left:0;
      right:0;
      bottom:10px;
      height:130px;
      display:flex;
      justify-content:space-between;
      padding:0 14px;
      pointer-events:none;
    }
    .padBtn{
      pointer-events:auto;
      width:120px;
      height:120px;
      border-radius:14px;
      border:2px solid rgba(255,255,255,0.28);
      background:rgba(255,255,255,0.12);
      color:var(--ink);
      font-weight:900;
      font-size:26px;
      display:grid;
      place-items:center;
      cursor:pointer;
      touch-action:none;
      opacity:0.55;
    }
    .padBtn:active{
      opacity:0.82;
      transform: translateY(1px);
      background:rgba(255,255,255,0.18);
    }
    .padMid{ width:160px; }

    .hint{
      position:fixed;
      left:10px;
      bottom:10px;
      font-size:12px;
      color:var(--muted);
      background:rgba(255,255,255,0.06);
      border:1px solid rgba(255,255,255,0.10);
      padding:6px 8px;
      border-radius:10px;
      backdrop-filter: blur(6px);
      line-height:1.35;
      max-width:min(520px, 94vw);
    }
    @media (max-width:520px){
      .hint{ display:none; }
    }
  </style>
</head>

<body>
  <div class="frame">
    <div class="stageWrap">
      <div class="stage" id="stage">

        <div class="topbar">
          <div class="topLeft">
            <button class="iconBtn" id="pauseBtn" aria-label="Pause/Resume">⏸</button>
            <button class="iconBtn" id="volBtn" aria-label="Volume">🔇</button>
          </div>
          <div class="scoreWrap">
            <div class="scoreLabel">Score</div>
            <div class="scoreValue" id="score">0</div>
          </div>
        </div>

        <div class="boardWrap" id="boardWrap">
          <canvas id="board"></canvas>

          <div class="pads">
            <button class="padBtn" id="btnLeft" aria-label="Move left">◀</button>
            <button class="padBtn padMid" id="btnDown" aria-label="Drop">▼</button>
            <button class="padBtn" id="btnRight" aria-label="Move right">▶</button>
          </div>
        </div>

        <div class="side">
          <div class="nextPanel">
            <div class="panelTitle">Next</div>
            <div class="nextStack">
              <div class="miniBox"><canvas id="next0"></canvas></div>
              <div class="miniBox"><canvas id="next1"></canvas></div>
              <div class="miniBox"><canvas id="next2"></canvas></div>
            </div>
          </div>

          <div class="holdPanel">
            <div class="panelTitle">HOLD</div>
            <div class="holdBtn" id="holdBtn" aria-label="Hold piece">
              <canvas id="hold"></canvas>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="hint">
    PC: ← → move, ↓ soft drop, ↑ rotate, Space hard drop, C hold, P pause, R restart<br>
    Mobile: tap/hold board = rotate; tap HOLD = store; tap ▼ = hard drop; hold ▼ = fast drop
  </div>

<script>
(() => {
  /***********************
   * ASSETS (50×50 tiles)
   ***********************/
  const ASSETS = {
    cyan:      "./asset/blocks/block_cyan.png",
    yellow:    "./asset/blocks/block_yellow.png",
    purple:    "./asset/blocks/block_purple.png",
    green:     "./asset/blocks/block_green.png",
    red:       "./asset/blocks/block_red.png",
    blue:      "./asset/blocks/block_blue.png",
    light_red: "./asset/blocks/block_light_red.png",
  };

  /***********************
   * GAME CONSTANTS
   ***********************/
  const COLS = 10, ROWS = 18;
  const TILE = 50;
  const BOARD_W = COLS * TILE;
  const BOARD_H = ROWS * TILE;

  const LINE_POINTS = [0, 100, 300, 500, 800];

  // Slower at level 1; speed up gently (level not displayed, but used)
  function levelToMs(level) {
    return Math.max(160, 1100 - (level - 1) * 80);
  }

  /***********************
   * PIECES (L uses light_red)
   ***********************/
  const PIECES = {
    I: { key:"cyan", rots:[
      [[0,1],[1,1],[2,1],[3,1]],
      [[2,0],[2,1],[2,2],[2,3]],
      [[0,2],[1,2],[2,2],[3,2]],
      [[1,0],[1,1],[1,2],[1,3]],
    ]},
    O: { key:"yellow", rots:[
      [[1,1],[2,1],[1,2],[2,2]],
      [[1,1],[2,1],[1,2],[2,2]],
      [[1,1],[2,1],[1,2],[2,2]],
      [[1,1],[2,1],[1,2],[2,2]],
    ]},
    T: { key:"purple", rots:[
      [[1,1],[0,2],[1,2],[2,2]],
      [[1,1],[1,2],[2,2],[1,3]],
      [[0,2],[1,2],[2,2],[1,3]],
      [[1,1],[0,2],[1,2],[1,3]],
    ]},
    S: { key:"green", rots:[
      [[1,1],[2,1],[0,2],[1,2]],
      [[1,1],[1,2],[2,2],[2,3]],
      [[1,2],[2,2],[0,3],[1,3]],
      [[0,1],[0,2],[1,2],[1,3]],
    ]},
    Z: { key:"red", rots:[
      [[0,1],[1,1],[1,2],[2,2]],
      [[2,1],[1,2],[2,2],[1,3]],
      [[0,2],[1,2],[1,3],[2,3]],
      [[1,1],[0,2],[1,2],[0,3]],
    ]},
    J: { key:"blue", rots:[
      [[0,1],[0,2],[1,2],[2,2]],
      [[1,1],[2,1],[1,2],[1,3]],
      [[0,2],[1,2],[2,2],[2,3]],
      [[1,1],[1,2],[0,3],[1,3]],
    ]},
    L: { key:"light_red", rots:[
      [[2,1],[0,2],[1,2],[2,2]],
      [[1,1],[1,2],[1,3],[2,3]],
      [[0,2],[1,2],[2,2],[0,3]],
      [[0,1],[1,1],[1,2],[1,3]],
    ]},
  };
  const TYPES = Object.keys(PIECES);

  /***********************
   * DOM + CANVAS (HiDPI)
   ***********************/
  const stageEl = document.getElementById("stage");
  const boardWrap = document.getElementById("boardWrap");
  const boardCanvas = document.getElementById("board");
  const boardCtx = boardCanvas.getContext("2d");

  const nextCanvases = [document.getElementById("next0"), document.getElementById("next1"), document.getElementById("next2")];
  const nextCtxs = nextCanvases.map(c => c.getContext("2d"));

  const holdCanvas = document.getElementById("hold");
  const holdCtx = holdCanvas.getContext("2d");

  const elScore = document.getElementById("score");
  const pauseBtn = document.getElementById("pauseBtn");
  const volBtn = document.getElementById("volBtn");
  const holdBtn = document.getElementById("holdBtn");

  const btnLeft = document.getElementById("btnLeft");
  const btnDown = document.getElementById("btnDown");
  const btnRight = document.getElementById("btnRight");

  function setupHiDPI(canvas, cssW, cssH) {
    const dpr = window.devicePixelRatio || 1;
    canvas.style.width = cssW + "px";
    canvas.style.height = cssH + "px";
    canvas.width = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
    const ctx = canvas.getContext("2d");
    ctx.setTransform(dpr,0,0,dpr,0,0);
    ctx.imageSmoothingEnabled = false;
    return ctx;
  }

  function setupCanvases() {
    setupHiDPI(boardCanvas, BOARD_W, BOARD_H);
    // each miniBox is 150×120; inner canvas 140×110 for padding
    nextCanvases.forEach(c => setupHiDPI(c, 140, 110));
    setupHiDPI(holdCanvas, 140, 110);
  }

  // Fit stage inside viewport; height=100% priority, also fit width
  function fitStage() {
    const pad = 20;
    const availW = Math.max(50, window.innerWidth - pad);
    const availH = Math.max(50, window.innerHeight - pad);
    const nativeW = 670;
    const nativeH = 970;
    const s = Math.min(availW / nativeW, availH / nativeH);
    stageEl.style.setProperty("--scale", String(s));
  }

  /***********************
   * IMAGES
   ***********************/
  const imgs = {};
  const imgReady = {};
  function loadImages() {
    const keys = Object.keys(ASSETS);
    let done = 0;
    return new Promise((resolve) => {
      keys.forEach((k) => {
        const img = new Image();
        imgs[k] = img;
        imgReady[k] = false;
        img.onload = () => { imgReady[k] = true; done++; if (done === keys.length) resolve(); };
        img.onerror = () => { done++; if (done === keys.length) resolve(); };
        img.src = ASSETS[k];
      });
    });
  }

  function drawTile(ctx, key, x, y, size, alpha=1) {
    const px = x * size, py = y * size;
    ctx.save();
    ctx.globalAlpha = alpha;
    if (imgReady[key] && imgs[key]) {
      ctx.drawImage(imgs[key], px, py, size, size);
    } else {
      ctx.fillStyle = "rgba(255,255,255,0.16)";
      ctx.fillRect(px, py, size, size);
      ctx.strokeStyle = "rgba(255,255,255,0.32)";
      ctx.strokeRect(px + 1, py + 1, size - 2, size - 2);
    }
    ctx.restore();
  }

  /***********************
   * AUDIO (volume button)
   ***********************/
  const VOL_STATES = [
    {name:"mute", icon:"🔇", gain:0},
    {name:"low",  icon:"🔈", gain:0.15},
    {name:"mid",  icon:"🔉", gain:0.35},
    {name:"loud", icon:"🔊", gain:0.70},
  ];
  let volIndex = 0;
  let audioCtx = null;

  function ensureAudio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    // Some browsers start suspended until a gesture; pointer events count as gesture.
    if (audioCtx.state === "suspended") audioCtx.resume().catch(()=>{});
  }
  function beep(freq, durMs, type="sine") {
    const g = VOL_STATES[volIndex].gain;
    if (g <= 0) return;
    ensureAudio();
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(g, now);
    gain.gain.exponentialRampToValueAtTime(Math.max(0.0001, g * 0.001), now + durMs/1000);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + durMs/1000);
  }
  function sfxClick(){ beep(640, 60, "square"); }
  function sfxThud(){ beep(140, 90, "triangle"); }

  function cycleVolume() {
    volIndex = (volIndex + 1) % VOL_STATES.length;
    volBtn.textContent = VOL_STATES[volIndex].icon;
    sfxClick();
  }

  /***********************
   * TETRIS STATE
   ***********************/
  let board = null;
  let score = 0;
  let lines = 0;
  let level = 1;

  let bag = [];
  let current = null;
  let hold = null;
  let holdUsed = false;
  let nextQueue = []; // 3 upcoming

  let paused = false;
  let gameOver = false;

  let lastTime = 0;
  let dropAcc = 0;
  let dropMs = levelToMs(1);

  function newBoard() {
    return Array.from({length: ROWS}, () => Array(COLS).fill(null));
  }

  function refillBag() {
    bag = TYPES.slice();
    for (let i = bag.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [bag[i], bag[j]] = [bag[j], bag[i]];
    }
  }

  function takeFromBag() {
    if (bag.length === 0) refillBag();
    return bag.pop();
  }

  function spawnPiece(type) {
    const p = PIECES[type];
    return { type, key: p.key, rot: 0, x: 3, y: -2 };
  }

  function cellsOf(piece) {
    const shape = PIECES[piece.type].rots[piece.rot];
    return shape.map(([dx, dy]) => [piece.x + dx, piece.y + dy]);
  }

  function collides(piece) {
    for (const [x, y] of cellsOf(piece)) {
      if (x < 0 || x >= COLS) return true;
      if (y >= ROWS) return true;
      if (y >= 0 && board[y][x]) return true;
    }
    return false;
  }

  function clearLines() {
    let cleared = 0;
    for (let y = ROWS - 1; y >= 0; y--) {
      if (board[y].every(c => c !== null)) {
        board.splice(y, 1);
        board.unshift(Array(COLS).fill(null));
        cleared++;
        y++;
      }
    }
    if (cleared) {
      lines += cleared;
      score += LINE_POINTS[cleared] * level;
      const newLevel = Math.floor(lines / 10) + 1;
      if (newLevel !== level) {
        level = newLevel;
        dropMs = levelToMs(level);
      }
    }
  }

  function lockPiece() {
    for (const [x, y] of cellsOf(current)) {
      if (y < 0) { gameOver = true; return; }
      board[y][x] = current.key;
    }
    clearLines();
    holdUsed = false;

    current = spawnPiece(nextQueue.shift());
    nextQueue.push(takeFromBag());
    if (collides(current)) gameOver = true;
  }

  function move(dx) {
    if (paused || gameOver) return;
    const t = {...current, x: current.x + dx};
    if (!collides(t)) current = t;
  }

  function rotateCW() {
    if (paused || gameOver) return;
    const nextRot = (current.rot + 1) % 4;
    const base = {...current, rot: nextRot};

    const kicks = [0, -1, 1, -2, 2];
    for (const k of kicks) {
      const t = {...base, x: base.x + k};
      if (!collides(t)) { current = t; sfxClick(); return; }
    }
  }

  function softDropOnce(addScore=true) {
    if (paused || gameOver) return false;
    const t = {...current, y: current.y + 1};
    if (!collides(t)) {
      current = t;
      if (addScore) score += 1;
      return true;
    }
    lockPiece();
    return false;
  }

  function hardDrop() {
    if (paused || gameOver) return;
    let moved = 0;
    while (true) {
      const t = {...current, y: current.y + 1};
      if (collides(t)) break;
      current = t;
      moved++;
    }
    score += moved * 2;
    sfxThud();
    lockPiece();
  }

  function doHold() {
    if (paused || gameOver) return;
    if (holdUsed) return;
    holdUsed = true;

    if (!hold) {
      hold = current.type;
      current = spawnPiece(nextQueue.shift());
      nextQueue.push(takeFromBag());
    } else {
      const tmp = hold;
      hold = current.type;
      current = spawnPiece(tmp);
    }

    current.x = 3; current.y = -2; current.rot = 0;
    if (collides(current)) gameOver = true;
    sfxClick();
  }

  function restart() {
    board = newBoard();
    score = 0; lines = 0; level = 1;
    dropMs = levelToMs(level);
    paused = false; gameOver = false;
    hold = null; holdUsed = false;
    dropAcc = 0;

    refillBag();
    nextQueue = [takeFromBag(), takeFromBag(), takeFromBag()];
    current = spawnPiece(takeFromBag());

    updatePauseIcon();
    renderAll();
  }

  /***********************
   * RENDERING
   ***********************/
  function clear(ctx, w, h){ ctx.clearRect(0,0,w,h); }

  function drawGrid() {
    boardCtx.save();
    boardCtx.strokeStyle = "rgba(255,255,255,0.06)";
    for (let x=1; x<COLS; x++){
      boardCtx.beginPath();
      boardCtx.moveTo(x*TILE, 0);
      boardCtx.lineTo(x*TILE, BOARD_H);
      boardCtx.stroke();
    }
    for (let y=1; y<ROWS; y++){
      boardCtx.beginPath();
      boardCtx.moveTo(0, y*TILE);
      boardCtx.lineTo(BOARD_W, y*TILE);
      boardCtx.stroke();
    }
    boardCtx.restore();
  }

  function drawBoard() {
    clear(boardCtx, BOARD_W, BOARD_H);

    for (let y=0; y<ROWS; y++){
      for (let x=0; x<COLS; x++){
        const cell = board[y][x];
        if (cell) drawTile(boardCtx, cell, x, y, TILE, 1);
      }
    }

    if (current && !gameOver) {
      for (const [x,y] of cellsOf(current)) {
        if (y >= 0) drawTile(boardCtx, current.key, x, y, TILE, 1);
      }
    }

    drawGrid();

    if (paused && !gameOver) {
      boardCtx.save();
      boardCtx.fillStyle = "rgba(0,0,0,0.45)";
      boardCtx.fillRect(0,0,BOARD_W,BOARD_H);
      boardCtx.fillStyle = "rgba(255,255,255,0.95)";
      boardCtx.textAlign = "center";
      boardCtx.font = "900 56px system-ui, sans-serif";
      boardCtx.fillText("PAUSED", BOARD_W/2, BOARD_H/2);
      boardCtx.restore();
    }

    if (gameOver) {
      boardCtx.save();
      boardCtx.fillStyle = "rgba(0,0,0,0.55)";
      boardCtx.fillRect(0,0,BOARD_W,BOARD_H);
      boardCtx.fillStyle = "rgba(255,255,255,0.95)";
      boardCtx.textAlign = "center";
      boardCtx.font = "900 56px system-ui, sans-serif";
      boardCtx.fillText("GAME OVER", BOARD_W/2, BOARD_H/2 - 10);
      boardCtx.font = "700 18px system-ui, sans-serif";
      boardCtx.fillText("Tap board / press R to restart", BOARD_W/2, BOARD_H/2 + 28);
      boardCtx.restore();
    }
  }

  function drawMini(ctx, type) {
    const W = 140, H = 110;
    clear(ctx, W, H);
    if (!type) return;

    const tile = 22;
    const shape = PIECES[type].rots[0];

    let minX=99, minY=99, maxX=-99, maxY=-99;
    for (const [dx,dy] of shape) {
      minX = Math.min(minX, dx);
      minY = Math.min(minY, dy);
      maxX = Math.max(maxX, dx);
      maxY = Math.max(maxY, dy);
    }
    const shapeW = (maxX - minX + 1) * tile;
    const shapeH = (maxY - minY + 1) * tile;
    const offX = Math.floor((W - shapeW) / 2) - minX * tile;
    const offY = Math.floor((H - shapeH) / 2) - minY * tile;

    for (const [dx,dy] of shape) {
      const px = offX + dx*tile;
      const py = offY + dy*tile;
      const key = PIECES[type].key;
      if (imgReady[key] && imgs[key]) {
        ctx.drawImage(imgs[key], px, py, tile, tile);
      } else {
        ctx.fillStyle = "rgba(255,255,255,0.16)";
        ctx.fillRect(px, py, tile, tile);
        ctx.strokeStyle = "rgba(255,255,255,0.30)";
        ctx.strokeRect(px + 1, py + 1, tile - 2, tile - 2);
      }
    }
  }

  function renderHUD() {
    elScore.textContent = String(score);
    for (let i=0; i<3; i++) drawMini(nextCtxs[i], nextQueue[i]);
    drawMini(holdCtx, hold);
  }

  function renderAll() {
    if (!board) return;
    drawBoard();
    renderHUD();
  }

  /***********************
   * INPUT (continuous move + rotate hold)
   ***********************/
  const input = {
    left:false, right:false, down:false, rotate:false,
    leftTime:0, rightTime:0, downTime:0, rotateTime:0,
    leftRepeats:0, rightRepeats:0, rotateRepeats:0
  };

  const DAS = 170;
  const ARR = 55;
  const ROT_DAS = 220;
  const ROT_ARR = 120;
  const SOFT_ARR = 45;

  function resetHold(which) {
    if (which === "left") { input.leftTime=0; input.leftRepeats=0; }
    if (which === "right"){ input.rightTime=0; input.rightRepeats=0; }
    if (which === "rotate"){ input.rotateTime=0; input.rotateRepeats=0; }
  }

  function handleHeld(dt) {
    if (paused || gameOver) return;

    if (input.left && !input.right) {
      input.leftTime += dt;
      if (input.leftTime >= DAS) {
        const reps = Math.floor((input.leftTime - DAS) / ARR);
        while (input.leftRepeats < reps) {
          move(-1); input.leftRepeats++;
        }
      }
    }
    if (input.right && !input.left) {
      input.rightTime += dt;
      if (input.rightTime >= DAS) {
        const reps = Math.floor((input.rightTime - DAS) / ARR);
        while (input.rightRepeats < reps) {
          move(1); input.rightRepeats++;
        }
      }
    }
    if (input.rotate) {
      input.rotateTime += dt;
      if (input.rotateTime >= ROT_DAS) {
        const reps = Math.floor((input.rotateTime - ROT_DAS) / ROT_ARR);
        while (input.rotateRepeats < reps) {
          rotateCW(); input.rotateRepeats++;
        }
      }
    }
    if (input.down) {
      input.downTime += dt;
      while (input.downTime >= SOFT_ARR) {
        input.downTime -= SOFT_ARR;
        softDropOnce(false);
        if (gameOver) break;
      }
    }
  }

  /***********************
   * Keyboard
   ***********************/
  window.addEventListener("keydown", (e) => {
    const k = e.key;
    if (["ArrowLeft","ArrowRight","ArrowDown","ArrowUp"," "].includes(k)) e.preventDefault();

    if (k === "r" || k === "R") { restart(); return; }
    if (k === "p" || k === "P") { togglePause(); return; }

    if (paused || gameOver) return;

    if (k === "ArrowLeft" && !input.left) {
      input.left = true; resetHold("left");
      move(-1);
    } else if (k === "ArrowRight" && !input.right) {
      input.right = true; resetHold("right");
      move(1);
    } else if (k === "ArrowDown" && !input.down) {
      input.down = true; input.downTime = 0;
      softDropOnce();
    } else if (k === "ArrowUp" && !input.rotate) {
      input.rotate = true; resetHold("rotate");
      rotateCW();
    } else if (k === " ") {
      hardDrop();
    } else if (k === "c" || k === "C" || k === "Shift") {
      doHold();
    }
  }, {passive:false});

  window.addEventListener("keyup", (e) => {
    const k = e.key;
    if (k === "ArrowLeft") { input.left=false; resetHold("left"); }
    else if (k === "ArrowRight"){ input.right=false; resetHold("right"); }
    else if (k === "ArrowDown"){ input.down=false; input.downTime=0; }
    else if (k === "ArrowUp"){ input.rotate=false; resetHold("rotate"); }
  }, {passive:false});

  /***********************
   * Buttons
   ***********************/
  function updatePauseIcon() {
    pauseBtn.textContent = paused ? "▶" : "⏸";
  }
  function togglePause() {
    if (gameOver) return;
    paused = !paused;
    updatePauseIcon();
    sfxClick();
  }

  pauseBtn.addEventListener("click", (e) => { e.preventDefault(); togglePause(); }, {passive:false});
  volBtn.addEventListener("click", (e) => { e.preventDefault(); cycleVolume(); }, {passive:false});

  holdBtn.addEventListener("pointerdown", (e) => {
    e.preventDefault(); e.stopPropagation();
    if (gameOver) { restart(); return; }
    doHold();
    renderAll();
  }, {passive:false});

  /***********************
   * Mobile keypads
   ***********************/
  function bindHoldMove(btn, dir) {
    const isLeft = dir < 0;

    const down = (e) => {
      e.preventDefault(); e.stopPropagation();
      if (gameOver) { restart(); return; }
      if (paused) return;

      if (isLeft) {
        input.left = true; input.right = false;
        resetHold("left");
        move(-1);
      } else {
        input.right = true; input.left = false;
        resetHold("right");
        move(1);
      }
      renderAll();
      btn.setPointerCapture?.(e.pointerId);
    };

    const up = (e) => {
      e.preventDefault(); e.stopPropagation();
      if (isLeft) { input.left = false; resetHold("left"); }
      else { input.right = false; resetHold("right"); }
      renderAll();
    };

    btn.addEventListener("pointerdown", down, {passive:false});
    btn.addEventListener("pointerup", up, {passive:false});
    btn.addEventListener("pointercancel", up, {passive:false});
    btn.addEventListener("pointerleave", up, {passive:false});
  }
  bindHoldMove(btnLeft, -1);
  bindHoldMove(btnRight, +1);

  // Down: tap = hard drop; hold = fast drop
  let downPressT0 = 0;
  let downSoftArmed = false;
  let downArmTimer = null;

  function downPointerDown(e) {
    e.preventDefault(); e.stopPropagation();
    if (gameOver) { restart(); return; }
    if (paused) return;

    downPressT0 = performance.now();
    downSoftArmed = false;

    downArmTimer = setTimeout(() => {
      downSoftArmed = true;
      input.down = true;
      input.downTime = 0;
      softDropOnce(false);
      renderAll();
    }, 160);

    btnDown.setPointerCapture?.(e.pointerId);
  }

  function downPointerUp(e) {
    e.preventDefault(); e.stopPropagation();
    const dt = performance.now() - downPressT0;

    if (downArmTimer) { clearTimeout(downArmTimer); downArmTimer = null; }

    if (input.down) {
      input.down = false;
      input.downTime = 0;
    }

    if (!downSoftArmed && dt < 160 && !paused && !gameOver) {
      hardDrop();
    }

    downSoftArmed = false;
    renderAll();
  }

  btnDown.addEventListener("pointerdown", downPointerDown, {passive:false});
  btnDown.addEventListener("pointerup", downPointerUp, {passive:false});
  btnDown.addEventListener("pointercancel", downPointerUp, {passive:false});
  btnDown.addEventListener("pointerleave", downPointerUp, {passive:false});

  /***********************
   * Tap/hold board to rotate (clockwise)
   ***********************/
  function boardRotateDown(e) {
    if (gameOver) { restart(); return; }
    if (paused) return;

    e.preventDefault();

    input.rotate = true;
    resetHold("rotate");
    rotateCW();
    renderAll();

    boardWrap.setPointerCapture?.(e.pointerId);
  }

  function boardRotateUp(e) {
    e.preventDefault();
    input.rotate = false;
    resetHold("rotate");
    renderAll();
  }

  boardWrap.addEventListener("pointerdown", boardRotateDown, {passive:false});
  boardWrap.addEventListener("pointerup", boardRotateUp, {passive:false});
  boardWrap.addEventListener("pointercancel", boardRotateUp, {passive:false});
  boardWrap.addEventListener("pointerleave", boardRotateUp, {passive:false});

  /***********************
   * GAME LOOP
   ***********************/
  function tick(t) {
    const dt = t - lastTime;
    lastTime = t;

    if (!paused && !gameOver) {
      handleHeld(dt);

      dropAcc += dt;
      while (dropAcc >= dropMs) {
        dropAcc -= dropMs;
        const moved = softDropOnce(false);
        if (!moved) break; // locked
        if (gameOver) break;
      }
    }

    renderAll();
    requestAnimationFrame(tick);
  }

  /***********************
   * BOOT
   ***********************/
  function boot() {
    setupCanvases();
    fitStage();
    window.addEventListener("resize", () => {
      setupCanvases();
      fitStage();
      renderAll();
    }, {passive:true});

    volBtn.textContent = VOL_STATES[volIndex].icon;
    restart();

    lastTime = performance.now();
    requestAnimationFrame(tick);
  }

  loadImages().then(boot);
})();
</script>
</body>
</html>
